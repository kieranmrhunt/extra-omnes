name: Extra Omnes regression gate

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: extra-omnes-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quick-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run deterministic engine and invariant checks
        run: node tests/harness.js --seeds=2 --quick
